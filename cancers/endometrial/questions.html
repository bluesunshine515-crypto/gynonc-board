<header class="site-header">

</header>

<main class="container">

  <nav class="tab-bar">
    <a href="index.html">📑 概覽</a>

    <a href="treatment.html">🌳 處置流程</a>

  </nav>

  <section class="section">
    <h2>練習題 · v1 自製 15 題</h2>
    <div id="quizContainer">載入中…</div>
  </section>

</main>

<footer class="site-footer">
  <div>作答進度與錯題紀錄存於 localStorage（裝置本地，不上雲）· 詳解含 inline mermaid 關聯決策樹</div>
</footer>

<script src="../../shared/components.js"></script>
<script>
  (async () => {
    try {
      if (window.mermaid) {
        mermaid.initialize({ startOnLoad: false, theme: 'neutral', flowchart: { htmlLabels: true, curve: 'basis' } });
      }
      const res = await fetch('../../data/endometrial/questions.json');
      const data = await res.json();
      document.getElementById('quizContainer').innerHTML = renderQuiz(data, 'endometrial');

      if (window.mermaid) {
        const alreadyShown = document.querySelectorAll('.quiz-explanation:not([hidden]) .mermaid');
        if (alreadyShown.length > 0) {
          await mermaid.run({ nodes: Array.from(alreadyShown) });
        }
      }
    } catch (e) {
      document.getElementById('quizContainer').innerHTML =
        '<div class="stub">questions.json 載入失敗: ' + e.message + '</div>';
    }
  })();
</script>

</body>
</html>
