<script src="../../shared/components.js"></script>
<script>
  (async () => {
    try {
      const res = await fetch('../../data/endometrial/treatment.json');
      const data = await res.json();
      document.getElementById('treatmentContainer').innerHTML = renderTreatment(data);
      if (window.mermaid) {
        mermaid.initialize({ startOnLoad: false, theme: 'neutral', flowchart: { htmlLabels: true, curve: 'basis' } });
        await mermaid.run({ querySelector: '.mermaid' });
      }
    } catch (e) {
      document.getElementById('treatmentContainer').innerHTML =
        '<div class="stub">treatment.json 載入失敗: ' + e.message + '</div>';
    }
  })();
</script>
